<article>
  <ul class="archive" style="padding-left: 0;">
    {% for post in site.posts %}
    <li style="list-style-type: none"># 
      <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</article>
